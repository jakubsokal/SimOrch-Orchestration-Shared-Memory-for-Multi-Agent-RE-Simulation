scenario:
  scenario_name: "Meeting Room Booking Elicitation"
  description: "A dialogue between a Requirements Engineer and a User(employee) and a User(office manager) to elicit requirements for a corporate room booking system."
  seed: 42 
  max_turns: 3

  agents:
    - name: "Requirements Engineer"
      role: 1
      params:
        temperature: 0
        num_predict: 512
      provider: "OLLAMA"
      model: "llama2" 
      context_prompt: "You are a helpful Requirements Engineer. Your goal is to ask clear, open-ended questions to understand the user's needs for a new meeting room booking system."

    - name: "Office Employee"
      params:
        temperature: 0
        num_predict: 512
      role: 2
      provider: "OLLAMA"
      model: "llama2"
      context_prompt: "You are an office employee. You need a system to book meeting rooms easily. You are frustrated with the current, manual email-based process."

    - name: "Office Manager"
      role: 2
      params:
        temperature: 0
        num_predict: 512
      provider: "OLLAMA"
      model: "llama2"
      context_prompt: "You are an office manager. You want a meeting room booking system that minimises scheduling conflicts and maximises room utilisation."
